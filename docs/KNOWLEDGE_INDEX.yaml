# =============================================================================
# QUICK REFERENCES
# =============================================================================

quick_references:
  closures: |
    Create Closure:
      ├── Define inputs/outputs
      ├── Build internal logic
      └── Mark as reusable
    Invoke Closure:
      ├── Pass inputs
      ├── Execute logic
      └── Receive outputs

  bundles: |
    Create Bundle:
      Store Bundle Item (key, value)
    Read Bundle:
      Get Bundle Item (bundle, key)
    Bundle Contents:
      Bundle Info (bundle) → keys

  volume_grids: |
    Create Grid:
      Volume Cube / Points to SDF / Mesh to SDF
    Process Grid:
      Grid Dilate / Grid Erode / Grid Blur
    Extract Grid:
      Grid to Mesh / Sample Grid / Store Named Grid

  physics_bundles: |
    Define Physics:
      Gravity + Damping + Collisions
    Apply to Simulation:
      Physics Bundle → Sim Zone → Solver

